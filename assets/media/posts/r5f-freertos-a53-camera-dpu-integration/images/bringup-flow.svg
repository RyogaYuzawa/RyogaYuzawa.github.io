<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="450" viewBox="0 0 1400 450" role="img" aria-labelledby="title desc">
  <title id="title">R5F and RPMsg bring-up order</title>
  <desc id="desc">A seven-stage bring-up sequence validates memory, boot-time reservation, firmware, remoteproc, RPMsg, synthetic transport, and finally camera integration.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1400" height="450" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g transform="translate(0 -115)">
    <g filter="url(#shadow)"><rect x="55" y="150" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="89" cy="184" r="21" fill="#6366f1"/>
    <text x="89" y="191" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">1</text>
    <text x="190" y="220" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Audit target memory</text>
    <text x="190" y="248" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Live DT · iomem · CMA</text><g filter="url(#shadow)"><rect x="390" y="150" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="424" cy="184" r="21" fill="#8b5cf6"/>
    <text x="424" y="191" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">2</text>
    <text x="525" y="220" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Reserve at boot</text>
    <text x="525" y="248" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Merge user-override.dtb</text><g filter="url(#shadow)"><rect x="725" y="150" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="759" cy="184" r="21" fill="#0ea5e9"/>
    <text x="759" y="191" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">3</text>
    <text x="860" y="220" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Build + verify ELF</text>
    <text x="860" y="248" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Vitis 2024.2 · XSA</text><g filter="url(#shadow)"><rect x="1060" y="150" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="1094" cy="184" r="21" fill="#06b6d4"/>
    <text x="1094" y="191" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">4</text>
    <text x="1195" y="220" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Start remoteproc</text>
    <text x="1195" y="248" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Load ELF · release R5F</text><g filter="url(#shadow)"><rect x="725" y="400" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="759" cy="434" r="21" fill="#14b8a6"/>
    <text x="759" y="441" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">5</text>
    <text x="860" y="470" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Create RPMsg endpoint</text>
    <text x="860" y="498" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Name service · rpmsg-char</text><g filter="url(#shadow)"><rect x="390" y="400" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="424" cy="434" r="21" fill="#10b981"/>
    <text x="424" y="441" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">6</text>
    <text x="525" y="470" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Test transport</text>
    <text x="525" y="498" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Fresh · stale · restart</text><g filter="url(#shadow)"><rect x="55" y="400" width="270" height="126" rx="20" fill="#ffffff" stroke="#cbd5e1"/></g>
    <circle cx="89" cy="434" r="21" fill="#f59e0b"/>
    <text x="89" y="441" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">7</text>
    <text x="190" y="470" text-anchor="middle" fill="#0f172a" font-size="19" font-weight="800">Integrate camera/DPU</text>
    <text x="190" y="498" text-anchor="middle" fill="#64748b" font-size="14" font-weight="600">Publish real vision results</text>
    <g fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round">
      <path d="M 325 213 H 378"/>
      <path d="M 660 213 H 713"/>
      <path d="M 995 213 H 1048"/>
      <path d="M 1195 276 V 340 C 1195 420, 1100 463, 1007 463"/>
      <path d="M 725 463 H 672"/>
      <path d="M 390 463 H 337"/>
    </g>
    <g fill="#64748b" stroke="none">
      <path d="M 378 207 L 390 213 L 378 219 Z"/>
      <path d="M 713 207 L 725 213 L 713 219 Z"/>
      <path d="M 1048 207 L 1060 213 L 1048 219 Z"/>
      <path d="M 1007 457 L 995 463 L 1007 469 Z"/>
      <path d="M 672 457 L 660 463 L 672 469 Z"/>
      <path d="M 337 457 L 325 463 L 337 469 Z"/>
    </g>
    </g>
  </g>
</svg>
