<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">KV260 R5F and RPMsg memory map</title>
  <desc id="desc">The reserved-memory contract places firmware, trace, two vrings, and the RPMsg shared-buffer pool at non-overlapping physical DDR addresses.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1100" height="520" rx="28" fill="#f8fafc"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="500" y="30" fill="#475569" font-size="14" font-weight="750">SIZE</text>
    <g transform="translate(0 -120)">
    <rect x="500" y="174" width="115" height="72" rx="4" fill="#6366f1" fill-opacity="0.72" stroke="#6366f1" stroke-width="2"/>
    <text x="70" y="205" fill="#0f172a" font-size="19" font-weight="750">R5F firmware DDR</text>
    <text x="70" y="228" fill="#64748b" font-size="14" font-weight="600">0x79000000 – 0x7903FFFF</text>
    <text x="631" y="218" fill="#0f172a" font-size="16" font-weight="700">0x00040000</text><rect x="500" y="266" width="1.79688" height="72" rx="4" fill="#8b5cf6" fill-opacity="0.72" stroke="#8b5cf6" stroke-width="2"/>
    <text x="70" y="297" fill="#0f172a" font-size="19" font-weight="750">RSC_TRACE</text>
    <text x="70" y="320" fill="#64748b" font-size="14" font-weight="600">0x7903F000 – 0x7903FFFF</text>
    <text x="517.797" y="310" fill="#0f172a" font-size="16" font-weight="700">0x00001000</text><rect x="500" y="358" width="7.1875" height="72" rx="4" fill="#0ea5e9" fill-opacity="0.72" stroke="#0ea5e9" stroke-width="2"/>
    <text x="70" y="389" fill="#0f172a" font-size="19" font-weight="750">vring0</text>
    <text x="70" y="412" fill="#64748b" font-size="14" font-weight="600">0x79040000 – 0x79043FFF</text>
    <text x="523.188" y="402" fill="#0f172a" font-size="16" font-weight="700">0x00004000</text><rect x="500" y="450" width="7.1875" height="72" rx="4" fill="#06b6d4" fill-opacity="0.72" stroke="#06b6d4" stroke-width="2"/>
    <text x="70" y="481" fill="#0f172a" font-size="19" font-weight="750">vring1</text>
    <text x="70" y="504" fill="#64748b" font-size="14" font-weight="600">0x79044000 – 0x79047FFF</text>
    <text x="523.188" y="494" fill="#0f172a" font-size="16" font-weight="700">0x00004000</text><rect x="500" y="542" width="460" height="72" rx="4" fill="#14b8a6" fill-opacity="0.72" stroke="#14b8a6" stroke-width="2"/>
    <text x="70" y="573" fill="#0f172a" font-size="19" font-weight="750">RPMsg shared buffers</text>
    <text x="70" y="596" fill="#64748b" font-size="14" font-weight="600">0x79048000 – 0x79147FFF</text>
    <text x="976" y="586" fill="#0f172a" font-size="16" font-weight="700">0x00100000</text>
    </g>
  </g>
</svg>
