<text x="34" y="732" font-family="sans-serif" font-size="18" font-weight="bold">Hardware implementation and measured intervals</text>
<text x="34" y="757" font-family="sans-serif" font-size="14">Camera HW: IMX219 → MIPI CSI-2 RX → ISP Pipeline → Video Scaler → Frame Buffer Write(DMA) → DDR/V4L2 → GStreamer/appsink → A53</text>
<text x="34" y="780" font-family="sans-serif" font-size="14">AI path: Mapped NV12 planes → A53 CPU preprocess → PL DPU → A53 postprocess → RPMsg → R5F</text>
<rect x="34" y="795" width="14" height="14" fill="#2f5597" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="807" font-family="monospace" font-size="13" font-weight="bold">camera_isp_buffer_wait</text>
<text x="250" y="807" font-family="sans-serif" font-size="13">Frame-buffer DMA/EOF timestamp → appsink pull start; mostly Linux/GStreamer wait, not ISP execution</text>
<rect x="34" y="825" width="14" height="14" fill="#76b7b2" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="837" font-family="monospace" font-size="13" font-weight="bold">camera_dequeue</text>
<text x="250" y="837" font-family="sans-serif" font-size="13">A53/GStreamer: gst_app_sink_pull_sample() call</text>
<rect x="34" y="855" width="14" height="14" fill="#9c755f" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="867" font-family="monospace" font-size="13" font-weight="bold">camera_map</text>
<text x="250" y="867" font-family="sans-serif" font-size="13">A53/GStreamer: map DMA-backed GstVideoFrame planes; no frame copy</text>
<rect x="34" y="885" width="14" height="14" fill="#59a14f" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="897" font-family="monospace" font-size="13" font-weight="bold">preprocess</text>
<text x="250" y="897" font-family="sans-serif" font-size="13">A53 CPU: NV12 → 640x360 int8; launcher sets R5CD_CPU_PREPROCESS=1</text>
<rect x="34" y="915" width="14" height="14" fill="#e15759" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="927" font-family="monospace" font-size="13" font-weight="bold">dpu</text>
<text x="250" y="927" font-family="sans-serif" font-size="13">PL DPU/VART: execute_async submission → completion observed by wait; upper bound including host observation delay</text>
<rect x="34" y="945" width="14" height="14" fill="#f28e2b" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="957" font-family="monospace" font-size="13" font-weight="bold">postprocess</text>
<text x="250" y="957" font-family="sans-serif" font-size="13">A53 CPU: decode/filter DPU output and update overlay state</text>
<rect x="34" y="975" width="14" height="14" fill="#b07aa1" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="987" font-family="monospace" font-size="13" font-weight="bold">rpmsg</text>
<text x="250" y="987" font-family="sans-serif" font-size="13">A53 Linux: write heartbeat + vision result to RPMsg; R5F handling excluded</text>
