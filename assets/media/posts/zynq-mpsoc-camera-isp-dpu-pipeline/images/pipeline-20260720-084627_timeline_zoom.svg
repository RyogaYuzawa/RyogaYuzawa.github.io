<rect x="18" y="690" width="1564" height="347" rx="8" fill="#f7f8fa" stroke="#c7ccd1"/>
<text x="34" y="720" font-family="sans-serif" font-size="19" font-weight="bold">Hardware implementation and measured intervals</text>
<text x="34" y="747" font-family="sans-serif" font-size="14">Camera HW: IMX219 → MIPI CSI-2 RX → ISP Pipeline → Video Scaler → Frame Buffer Write(DMA) → DDR/V4L2 → GStreamer/appsink → A53</text>
<text x="34" y="771" font-family="sans-serif" font-size="14">AI path: A53 NV12 copy → A53 CPU preprocess → PL DPU → A53 postprocess → RPMsg → R5F</text>
<text x="34" y="796" font-family="sans-serif" font-size="13" font-weight="bold" fill="#b00020">IMPORTANT: camera_isp_buffer_wait is not ISP execution time; it starts near Frame Buffer DMA/EOF completion.</text>
<rect x="34" y="812" width="14" height="14" fill="#2f5597" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="824" font-family="monospace" font-size="13" font-weight="bold">camera_isp_buffer_wait</text>
<text x="265" y="824" font-family="sans-serif" font-size="13">DMA/EOF timestamp → appsink pull start; mostly Linux/GStreamer wait. Sensor/CSI/ISP/Scaler execution is excluded.</text>
<rect x="34" y="846" width="14" height="14" fill="#76b7b2" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="858" font-family="monospace" font-size="13" font-weight="bold">camera_dequeue</text>
<text x="265" y="858" font-family="sans-serif" font-size="13">A53/GStreamer: gst_app_sink_pull_sample() call.</text>
<rect x="34" y="880" width="14" height="14" fill="#9c755f" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="892" font-family="monospace" font-size="13" font-weight="bold">camera_copy</text>
<text x="265" y="892" font-family="sans-serif" font-size="13">A53 CPU: map DMA buffer and memcpy 1920x1080 NV12 (about 3 MB) into std::vector.</text>
<rect x="34" y="914" width="14" height="14" fill="#59a14f" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="926" font-family="monospace" font-size="13" font-weight="bold">preprocess</text>
<text x="265" y="926" font-family="sans-serif" font-size="13">A53 CPU: NV12 → 640x360 int8. The launcher sets R5CD_CPU_PREPROCESS=1, so this is not the PL kernel.</text>
<rect x="34" y="948" width="14" height="14" fill="#e15759" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="960" font-family="monospace" font-size="13" font-weight="bold">dpu</text>
<text x="265" y="960" font-family="sans-serif" font-size="13">PL DPU/VART: execute_async submission → completion observed by wait; upper bound including host observation delay.</text>
<rect x="34" y="982" width="14" height="14" fill="#f28e2b" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="994" font-family="monospace" font-size="13" font-weight="bold">postprocess</text>
<text x="265" y="994" font-family="sans-serif" font-size="13">A53 CPU: decode/filter DPU output, create detections, and update overlay state.</text>
<rect x="34" y="1016" width="14" height="14" fill="#b07aa1" stroke="#222222" stroke-width="0.4"/>
<text x="56" y="1028" font-family="monospace" font-size="13" font-weight="bold">rpmsg</text>
<text x="265" y="1028" font-family="sans-serif" font-size="13">A53 Linux: write heartbeat and vision result to RPMsg. R5F receive/control processing is excluded.</text>
</svg>
